<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bild mit Code</title>
 
<style>

body{

    font-family: Arial, sans-serif;

    text-align: center;

    background-color: #f4f4f4;

    margin-top: 100px;

}
 
#imageContainer{

    display:none;

    margin-top:20px;

}
 
input{

    padding:10px;

    font-size:16px;

}
 
button{

    padding:10px 20px;

    font-size:16px;

    cursor:pointer;

}
</style>
 
</head>
<body>
 
<h2>Gib den Code ein um den Link zu sehen</h2>
 
<input type="text" id="codeInput" placeholder="Code eingeben">
<button onclick="checkCode()">Prüfen</button>
 
<p id="message">h</p>
 
<p id="imageContainer"><a id="secretLink" href="https://lukaswiegele-prog.github.io/informatik_krimi/cyberangrife.html" target="_blank" rel="noopener">Hier geht's zum Link</a></p>
 
<script>

function checkCode(){
 
let correctCode = "2025372942541120246845123202660";

let enteredCode = document.getElementById("codeInput").value;
 
if(enteredCode === correctCode){

    document.getElementById("imageContainer").style.display = "block";

    document.getElementById("message").innerText = "✅ Richtiger Code!";

}else{

    document.getElementById("message").innerText = "❌ Falscher Code!";

}
 
}
</script>
 
</body>
</html>
